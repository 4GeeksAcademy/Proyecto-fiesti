<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="icon" href="/4geeks.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiesti</title>
  </head>
  <body>
    <h1 class="text-center">Fiesti</h1>

    <div class="loginForm text-center">
      <div class="mb-3">
        <label for="inputEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="inputEmail" placeholder="email@gmail.com"/>
      </div>
      <label for="inputPassword" class="form-label">Contraseña</label>
      <input type="password" id="inputPassword" class="form-control" aria-describedby="passwordHelpBlock" placeholder="********">
      <div id="passwordHelpBlock" class="form-text">
      La contraseña debe tener entre 6 y 20 caracteres e incluir como mínimo una letra mayúscula, una letra minúscula y un número. Puedes añadir símbolos y espacios, pero no emojis.
      </div>

      <br>
      <button type="button" class="btn btn-primary">Iniciar sesión</button>
      <p>Inicia sesión de forma rápida con tu cuenta de Google</p>
      <button type="button" class="btn btn-secondary">Google</button>

      <br>
      <link>¿Has olvidado tu contraseña?</link> <span><a> Crear cuenta</a></span>
    </div>
  </body>
</html>
